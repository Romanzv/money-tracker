<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnonsTech Money Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        :root { --primary-blue: #2563eb; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f0f4f8; 
            background-image: radial-gradient(circle at top right, #e0e7ff, transparent);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .fab-gradient { background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); }
        .animate-in { animation: fadeIn 0.5s ease out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 640px) {
            .metric-text { font-size: 1.5rem !important; }
            .card-padding { padding: 1.25rem !important; }
        }
    </style>
</head>
<body class="text-slate-900 min-h-screen pb-20">

    <nav class="bg-white/80 backdrop-blur-md border-b border-blue-100 px-4 md:px-8 py-4 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fas fa-wallet text-white"></i>
                </div>
                <div class="hidden sm:block"><span class="text-xl font-bold tracking-tight text-slate-800">AnonsTech</span></div>
            </div>
            
            <div class="flex items-center bg-slate-100 p-1 rounded-xl border border-slate-200">
                <button onclick="changeMonth(-1)" class="p-2 hover:bg-white rounded-lg transition"><i class="fas fa-chevron-left text-xs"></i></button>
                <span id="currentRecapLabel" class="px-4 text-[10px] md:text-xs font-bold uppercase tracking-wider text-blue-600">Memuat...</span>
                <button onclick="changeMonth(1)" class="p-2 hover:bg-white rounded-lg transition"><i class="fas fa-chevron-right text-xs"></i></button>
            </div>

            <div id="statusIndicator" class="hidden md:flex items-center text-xs font-medium text-slate-500">
                <span id="indicatorDot" class="w-2 h-2 bg-emerald-500 rounded-full mr-2 animate-pulse"></span>
                <span id="indicatorText">Online</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8 space-y-6">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
            <div class="col-span-2 glass-card card-padding p-6 md:p-8 rounded-[2rem] shadow-xl shadow-blue-100/50">
                <p class="text-blue-600 font-semibold text-xs mb-1 uppercase tracking-wider">Total Saldo Aset</p>
                <h3 id="totalAset" class="metric-text text-3xl md:text-4xl font-extrabold tracking-tight text-slate-800">Rp 0</h3>
            </div>
            <div class="glass-card card-padding p-5 md:p-6 rounded-[2rem]">
                <p class="text-emerald-500 text-[10px] font-bold uppercase mb-1">Masuk</p>
                <h4 id="totalIn" class="text-lg md:text-xl font-bold text-slate-800">Rp 0</h4>
            </div>
            <div class="glass-card card-padding p-5 md:p-6 rounded-[2rem]">
                <p class="text-rose-500 text-[10px] font-bold uppercase mb-1">Keluar</p>
                <h4 id="totalOut" class="text-lg md:text-xl font-bold text-slate-800">Rp 0</h4>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden animate-in">
            <div class="px-6 py-5 border-b border-slate-50 flex justify-between items-center">
                <h3 class="font-bold text-slate-700">Aktivitas Terakhir</h3>
                <button onclick="refreshData()" class="text-blue-600 p-2 hover:bg-blue-50 rounded-full transition"><i class="fas fa-sync-alt text-sm"></i></button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left min-w-[500px]">
                    <thead>
                        <tr class="text-slate-400 text-[10px] uppercase font-bold tracking-widest">
                            <th class="px-6 py-4">Tipe</th>
                            <th class="px-6 py-4">Keterangan</th>
                            <th class="px-6 py-4">Tanggal</th>
                            <th class="px-6 py-4 text-right">Nominal</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody" class="divide-y divide-slate-50 text-sm">
                        <tr><td colspan="4" class="px-6 py-10 text-center text-slate-400 font-medium">Menghubungkan ke database...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="pt-8 pb-4 text-center">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em] mb-1 italic">Develop by roman</p>
            <p class="text-[9px] text-slate-300 uppercase tracking-widest">© 2026 AnonsTech Financial Core</p>
        </div>
    </main>

    <div class="fixed bottom-6 right-6 z-50">
        <button onclick="toggleModal()" class="fab-gradient w-14 h-14 md:w-16 md:h-16 text-white rounded-2xl shadow-2xl flex items-center justify-center group hover:scale-110 active:scale-95 transition-all">
            <i class="fas fa-plus text-xl md:text-2xl transition-transform group-hover:rotate-90"></i>
        </button>
    </div>

    <div id="modal" class="modal opacity-0 pointer-events-none fixed inset-0 flex items-center justify-center z-[100] transition-all duration-300 p-4">
        <div onclick="toggleModal()" class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm"></div>
        <div class="modal-container bg-white w-full max-w-md rounded-[2rem] shadow-2xl z-50 relative p-8 md:p-10">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Catat Transaksi</h2>
            <form id="financeForm" class="space-y-4">
                <input type="text" id="ketInput" placeholder="Keterangan" required class="w-full px-5 py-4 rounded-2xl bg-slate-50 outline-none border-2 border-transparent focus:border-blue-500 transition">
                <div class="grid grid-cols-2 gap-3">
                    <select id="katInput" class="w-full px-5 py-4 rounded-2xl bg-slate-50 outline-none border-2 border-transparent focus:border-blue-500 transition appearance-none">
                        <option value="Pemasukan">Pemasukan (+)</option>
                        <option value="Pengeluaran">Pengeluaran (-)</option>
                    </select>
                    <input type="date" id="tglInput" required class="w-full px-5 py-4 rounded-2xl bg-slate-50 outline-none border-2 border-transparent focus:border-blue-500 transition text-xs">
                </div>
                <input type="number" id="jmlInput" placeholder="Nominal (Rp)" required class="w-full px-5 py-4 rounded-2xl bg-slate-50 outline-none border-2 border-transparent focus:border-blue-500 transition font-bold text-lg">
                <button type="submit" id="submitBtn" class="w-full fab-gradient text-white font-bold py-5 rounded-2xl mt-4 shadow-lg hover:opacity-90 transition">Simpan Data</button>
            </form>
        </div>
    </div>

    <script>
        // GANTI LINK DI BAWAH INI DENGAN URL WEB APP KAMU
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwW6zEygXDfVu-eKeqapNc-F75l4Kq50n_knN_1MeUpT-wujugIevEIoNebEdk6Nfid/exec";

        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();

        function updateMonthLabel() {
            const names = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            document.getElementById('currentRecapLabel').innerText = names[currentMonth] + " " + currentYear;
        }

        function toggleModal() {
            const modal = document.getElementById('modal');
            modal.classList.toggle('opacity-0');
            modal.classList.toggle('pointer-events-none');
        }

        function changeMonth(step) {
            currentMonth += step;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            updateMonthLabel();
            refreshData();
        }

        async function refreshData() {
            setStatus('Syncing...', 'blue');
            try {
                const response = await fetch(`${WEB_APP_URL}?month=${currentMonth}&year=${currentYear}`);
                const data = await response.json();
                updateUI(data);
                setStatus('Online', 'emerald');
            } catch (e) {
                setStatus('Error Connection', 'rose');
            }
        }

        function setStatus(text, color) {
            document.getElementById('indicatorText').innerText = text;
            document.getElementById('indicatorDot').className = `w-2 h-2 bg-${color}-500 rounded-full mr-2 animate-pulse`;
        }

        document.getElementById('financeForm').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;

            const payload = {
                tanggal: document.getElementById('tglInput').value,
                keterangan: document.getElementById('ketInput').value,
                kategori: document.getElementById('katInput').value,
                jumlah: document.getElementById('jmlInput').value
            };

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Penting untuk Apps Script POST
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                toggleModal();
                this.reset();
                setTimeout(refreshData, 1500); // Tunggu sebentar agar GAS selesai menulis
            } catch (e) {
                alert('Gagal menyimpan data.');
            } finally {
                btn.innerHTML = 'Simpan Data';
                btn.disabled = false;
            }
        };

        function updateUI(res) {
            document.getElementById('totalAset').innerText = "Rp " + res.total.toLocaleString('id-ID');
            document.getElementById('totalIn').innerText = "Rp " + res.totalIn.toLocaleString('id-ID');
            document.getElementById('totalOut').innerText = "Rp " + res.totalOut.toLocaleString('id-ID');
            
            const historyBody = document.getElementById('historyBody');
            historyBody.innerHTML = '';
            
            if (res.history.length === 0) {
                historyBody.innerHTML = '<tr><td colspan="4" class="px-6 py-10 text-center text-slate-400 font-medium">Tidak ada transaksi di bulan ini.</td></tr>';
                return;
            }

            res.history.forEach((row) => {
                const isInc = row[2] === "Pemasukan";
                historyBody.insertAdjacentHTML('beforeend', `
                    <tr class="hover:bg-blue-50/50 transition">
                        <td class="px-6 py-4">
                            <span class="w-8 h-8 rounded-lg flex items-center justify-center ${isInc ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}">
                                <i class="fas ${isInc ? 'fa-arrow-up' : 'fa-arrow-down'} text-[10px]"></i>
                            </span>
                        </td>
                        <td class="px-6 py-4 font-semibold text-slate-700">${row[1]}</td>
                        <td class="px-6 py-4 text-slate-400">${new Date(row[0]).toLocaleDateString('id-ID', {day:'2-digit', month:'short'})}</td>
                        <td class="px-6 py-4 text-right font-bold ${isInc ? 'text-emerald-600' : 'text-slate-900'}">
                            ${isInc ? '+' : '-'}${Math.abs(row[3]).toLocaleString('id-ID')}
                        </td>
                    </tr>
                `);
            });
        }

        window.onload = () => {
            updateMonthLabel();
            refreshData();
        };
    </script>
</body>
</html>
