<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnonsTech Money Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .fab-gradient { background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); }
    </style>
</head>
<body class="text-slate-900 min-h-screen pb-24">

    <nav class="bg-white/80 backdrop-blur-md border-b border-blue-100 px-4 md:px-8 py-4 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg"><i class="fas fa-microchip text-white text-xs"></i></div>
                <span class="text-lg font-bold tracking-tight text-slate-800">AnonsTech</span>
            </div>
            <div class="flex items-center bg-slate-100 p-1 rounded-xl border border-slate-200">
                <button onclick="changeMonth(-1)" class="p-2 hover:bg-white rounded-lg transition"><i class="fas fa-chevron-left text-xs"></i></button>
                <span id="currentRecapLabel" class="px-4 text-[10px] font-bold uppercase tracking-wider text-blue-600">Mei 2026</span>
                <button onclick="changeMonth(1)" class="p-2 hover:bg-white rounded-lg transition"><i class="fas fa-chevron-right text-xs"></i></button>
            </div>
            <div id="statusIndicator" class="hidden md:flex items-center text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                <span id="indicatorDot" class="w-2 h-2 bg-emerald-500 rounded-full mr-2"></span> Online
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8 space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-2 glass-card p-6 md:p-8 rounded-[2.5rem] shadow-xl shadow-blue-100/50 flex flex-col justify-between">
                <div>
                    <p class="text-blue-600 font-bold text-[10px] uppercase tracking-[0.2em] mb-2">Kekayaan Bersih (Total Aset)</p>
                    <h3 id="totalAset" class="text-3xl md:text-5xl font-extrabold tracking-tighter">Rp 0</h3>
                    <div id="accountList" class="mt-6 flex flex-wrap gap-2"></div>
                </div>
            </div>
            <div class="bg-indigo-600 p-6 md:p-8 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden">
                <p class="text-indigo-200 font-bold text-[10px] uppercase tracking-[0.2em] mb-4">Cashflow Bulan Ini</p>
                <h3 id="netMonth" class="text-3xl font-bold mb-2">Rp 0</h3>
                <div class="mt-4 space-y-2 text-xs">
                    <div class="flex justify-between font-medium"><span class="opacity-70">Savings Rate</span><span id="saveRate">0%</span></div>
                    <div class="w-full bg-indigo-500 h-1.5 rounded-full overflow-hidden"><div id="saveBar" class="bg-emerald-400 h-full transition-all duration-1000" style="width: 0%"></div></div>
                </div>
                <i class="fas fa-chart-line absolute -right-4 -bottom-4 text-7xl opacity-10"></i>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
            <div class="glass-card p-5 rounded-[2rem] border-l-4 border-emerald-500">
                <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Total Pemasukan</p>
                <h4 id="totalIn" class="text-lg font-bold text-emerald-600">Rp 0</h4>
            </div>
            <div class="glass-card p-5 rounded-[2rem] border-l-4 border-rose-500">
                <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Total Pengeluaran</p>
                <h4 id="totalOut" class="text-lg font-bold text-rose-600">Rp 0</h4>
            </div>
            <div id="topCategory" class="col-span-2 glass-card p-5 rounded-[2rem] flex items-center justify-between">
                <div>
                    <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Pengeluaran Terbanyak</p>
                    <h4 id="maxCatName" class="text-lg font-bold">N/A</h4>
                </div>
                <div id="maxCatVal" class="text-right text-rose-600 font-bold">Rp 0</div>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
            <div class="px-8 py-6 border-b border-slate-50 flex justify-between items-center">
                <h3 class="font-bold text-slate-800 tracking-tight">Log Transaksi & Kontrol</h3>
                <button onclick="refreshData()" class="w-8 h-8 flex items-center justify-center bg-blue-50 text-blue-600 rounded-full hover:rotate-180 transition-all duration-500"><i class="fas fa-sync-alt text-xs"></i></button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-slate-400 text-[10px] uppercase font-bold tracking-widest bg-slate-50/50">
                            <th class="px-8 py-4">Status</th>
                            <th class="px-8 py-4">Detail</th>
                            <th class="px-8 py-4">Akun</th>
                            <th class="px-8 py-4 text-right">Nominal</th>
                            <th class="px-8 py-4 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>

        <footer class="text-center py-6">
            <p class="text-[10px] font-bold text-slate-300 uppercase tracking-[0.4em] mb-1">Develop by roman</p>
        </footer>
    </main>

    <div class="fixed bottom-8 right-8 z-50">
        <button onclick="toggleModal()" class="fab-gradient w-16 h-16 text-white rounded-[1.5rem] shadow-2xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all"><i class="fas fa-plus text-2xl"></i></button>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center px-4 backdrop-blur-sm bg-slate-900/40">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl p-8 md:p-10 relative animate-in">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-bold">Transaksi Baru</h2>
                <button onclick="toggleModal()" class="text-slate-400"><i class="fas fa-times"></i></button>
            </div>
            <form id="financeForm" class="space-y-4 text-sm">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-blue-600 uppercase ml-1">Keterangan</label>
                    <input type="text" id="ketInput" placeholder="Contoh: Makan Malam" required class="w-full px-5 py-4 rounded-2xl bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-blue-600 uppercase ml-1">Kategori</label>
                        <select id="katInput" class="w-full px-5 py-4 rounded-2xl bg-slate-50 outline-none appearance-none">
                            <option value="Makan & Minum">Makan & Minum</option>
                            <option value="Transportasi">Transportasi</option>
                            <option value="Belanja">Belanja</option>
                            <option value="Billing/Tagihan">Billing/Tagihan</option>
                            <option value="Gaji">Gaji</option>
                            <option value="Lainnya">Lainnya</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-blue-600 uppercase ml-1">Tipe</label>
                        <select id="typeInput" class="w-full px-5 py-4 rounded-2xl bg-slate-50 outline-none appearance-none">
                            <option value="Pengeluaran">Pengeluaran (-)</option>
                            <option value="Pemasukan">Pemasukan (+)</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-blue-600 uppercase ml-1">Sumber Dana</label>
                        <select id="sumberInput" class="w-full px-5 py-4 rounded-2xl bg-slate-50 outline-none appearance-none">
                            <option value="BCA">BCA</option>
                            <option value="DANA">DANA</option>
                            <option value="Mandiri">Mandiri</option>
                            <option value="Tunai">Tunai</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-blue-600 uppercase ml-1">Tanggal</label>
                        <input type="date" id="tglInput" required class="w-full px-5 py-4 rounded-2xl bg-slate-50 outline-none">
                    </div>
                </div>
                <div class="space-y-1 pt-2">
                    <label class="text-[10px] font-bold text-blue-600 uppercase ml-1 font-bold">Nominal (Rp)</label>
                    <input type="number" id="jmlInput" placeholder="0" required class="w-full px-5 py-4 rounded-2xl bg-slate-50 outline-none text-lg font-bold">
                </div>
                <button type="submit" id="submitBtn" class="w-full fab-gradient text-white font-bold py-5 rounded-2xl shadow-lg mt-4">Konfirmasi Simpan</button>
            </form>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwGhtNpaTr0mudI9-oK7PaOQ45n42u27cZKCkewsDK3W18qdKiV6B0pIV5IMZWnd9lxKg/exec";
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();

        function toggleModal() { document.getElementById('modal').classList.toggle('hidden'); }

        function changeMonth(step) {
            currentMonth += step;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            document.getElementById('currentRecapLabel').innerText = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"][currentMonth] + " " + currentYear;
            refreshData();
        }

        async function refreshData() {
            setStatus('Syncing...', 'blue');
            try {
                const res = await fetch(`${WEB_APP_URL}?month=${currentMonth}&year=${currentYear}`);
                const data = await res.json();
                updateUI(data);
                setStatus('Online', 'emerald');
            } catch (e) { setStatus('Error', 'rose'); }
        }

        function setStatus(t, c) {
            document.getElementById('indicatorText').innerText = t;
            document.getElementById('indicatorDot').className = `w-2 h-2 bg-${c}-500 rounded-full mr-2`;
        }

        document.getElementById('financeForm').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Processing..."; btn.disabled = true;

            const payload = {
                tanggal: document.getElementById('tglInput').value,
                keterangan: document.getElementById('ketInput').value,
                kategori_type: document.getElementById('katInput').value,
                kategori: document.getElementById('typeInput').value,
                jumlah: document.getElementById('jmlInput').value,
                sumber: document.getElementById('sumberInput').value
            };

            await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            toggleModal(); this.reset(); btn.innerText = "Konfirmasi Simpan"; btn.disabled = false;
            setTimeout(refreshData, 1500);
        };

        async function deleteData(tanggal, keterangan) {
            if(!confirm("Hapus transaksi ini?")) return;
            await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "delete", tanggal, keterangan }) });
            setTimeout(refreshData, 1000);
        }

        function updateUI(res) {
            document.getElementById('totalAset').innerText = "Rp " + res.total.toLocaleString('id-ID');
            document.getElementById('totalIn').innerText = "Rp " + res.totalIn.toLocaleString('id-ID');
            document.getElementById('totalOut').innerText = "Rp " + res.totalOut.toLocaleString('id-ID');
            
            const net = res.totalIn - res.totalOut;
            document.getElementById('netMonth').innerText = (net < 0 ? '-' : '') + "Rp " + Math.abs(net).toLocaleString('id-ID');
            const rate = res.totalIn > 0 ? Math.max(0, Math.floor((net / res.totalIn) * 100)) : 0;
            document.getElementById('saveRate').innerText = rate + "%";
            document.getElementById('saveBar').style.width = rate + "%";

            // Top Category
            const cats = Object.entries(res.categories).sort((a,b) => b[1] - a[1]);
            document.getElementById('maxCatName').innerText = cats[0] ? cats[0][0] : "N/A";
            document.getElementById('maxCatVal').innerText = "Rp " + (cats[0] ? cats[0][1].toLocaleString('id-ID') : 0);

            // Accounts
            const accList = document.getElementById('accountList');
            accList.innerHTML = '';
            Object.entries(res.accounts).forEach(([name, bal]) => {
                accList.insertAdjacentHTML('beforeend', `<div class="bg-blue-50 px-3 py-1.5 rounded-xl border border-blue-100 text-[10px] font-bold"><span class="text-blue-500">${name}:</span> Rp ${bal.toLocaleString('id-ID')}</div>`);
            });

            // History
            const historyBody = document.getElementById('historyBody');
            historyBody.innerHTML = '';
            res.history.forEach(row => {
                const isInc = row[3] > 0;
                historyBody.insertAdjacentHTML('beforeend', `
                    <tr class="hover:bg-slate-50 transition group">
                        <td class="px-8 py-5 text-center"><i class="fas ${isInc ? 'fa-plus-circle text-emerald-500' : 'fa-minus-circle text-rose-500'}"></i></td>
                        <td class="px-8 py-5"><p class="font-bold text-slate-700 text-sm">${row[1]}</p><p class="text-[9px] font-bold text-slate-400 uppercase">${row[2]}</p></td>
                        <td class="px-8 py-5 text-xs font-bold text-slate-400">${row[4]}</td>
                        <td class="px-8 py-5 text-right font-bold ${isInc ? 'text-emerald-600' : 'text-slate-800'}">Rp ${Math.abs(row[3]).toLocaleString('id-ID')}</td>
                        <td class="px-8 py-5 text-center"><button onclick="deleteData('${row[0]}', '${row[1]}')" class="text-slate-300 hover:text-rose-500 transition"><i class="fas fa-trash-alt"></i></button></td>
                    </tr>
                `);
            });
        }

        window.onload = () => { changeMonth(0); };
    </script>
</body>
</html>
